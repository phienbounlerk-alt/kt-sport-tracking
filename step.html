<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KT SPORT - Workflow Update</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand brand-link" href="./index.html">
        <div class="brand-mark"><img src="./assets/kt-sport-logo.jpg" alt="KT SPORT logo" /></div>
        <div>
          <strong>KT SPORT</strong>
          <span>ອັບເດດຂະບວນການຜະລິດ</span>
        </div>
      </a>
    </header>

    <main class="step-shell">
      <section class="step-card">
        <p class="eyebrow">Production Workflow</p>
        <h1 id="stepTitle">ກຳລັງດຶງຂໍ້ມູນ...</h1>
        <div id="stepSummary" class="step-summary"></div>

        <form id="stepForm" class="order-form">
          <label>
            Note
            <textarea id="stepNoteInput" rows="3" placeholder="ພິມລາຍລະອຽດວຽກ ຫຼື ໝາຍເຫດ"></textarea>
          </label>
          <label>
            ແນບຮູບປະກອບ
            <input id="stepImagesInput" type="file" accept="image/*" multiple />
          </label>
          <button id="stepSubmitButton" type="submit">ຢືນຢັນອັບເດດຂັ້ນຕອນນີ້</button>
          <p id="stepNotice" data-tone="muted">ກຳລັງກວດ link...</p>
        </form>
      </section>
    </main>

    <script src="./step.js"></script>
  </body>
</html>
