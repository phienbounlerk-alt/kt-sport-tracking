<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KT SPORT - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand login-brand">
          <div class="brand-mark"><img src="./assets/kt-sport-logo.jpg" alt="KT SPORT logo" /></div>
          <div>
            <strong>KT SPORT</strong>
            <span>ເຄທີ ສະປອສ</span>
          </div>
        </div>
        <h1>ເຂົ້າລະບົບ</h1>
        <form id="loginForm" class="login-form">
          <label>
            Email
            <input id="emailInput" type="email" autocomplete="email" placeholder="name@example.com" required autofocus />
          </label>
          <label>
            Password
            <span class="password-field">
              <input id="passwordInput" type="password" autocomplete="current-password" required />
              <button id="togglePasswordButton" type="button" aria-label="Show password">👁</button>
            </span>
          </label>
          <button type="submit">Login</button>
          <p id="loginNotice" data-tone="muted">ກະລຸນາໃສ່ລະຫັດເພື່ອເຂົ້າລະບົບ</p>
        </form>
      </section>
    </main>
    <script type="module">
      import { listenForAuth, signInAndGetProfile } from "./firebase-client.js";

      const STAFF_ROLES = new Set(["staff", "admin", "manager", "president", "vice_president", "accounting", "sale"]);
      const loginForm = document.querySelector("#loginForm");
      const emailInput = document.querySelector("#emailInput");
      const passwordInput = document.querySelector("#passwordInput");
      const togglePasswordButton = document.querySelector("#togglePasswordButton");
      const loginButton = loginForm.querySelector('button[type="submit"]');

      function setLoginNotice(message, tone = "muted") {
        const notice = document.querySelector("#loginNotice");
        notice.textContent = message;
        notice.dataset.tone = tone;
      }

      function routeByRole(role) {
        if (STAFF_ROLES.has(String(role || "").toLowerCase())) {
          window.location.href = "./dashboard.html";
          return;
        }
        if (String(role || "").toLowerCase() === "customer") {
          window.location.href = "./index.html";
          return;
        }
        setLoginNotice("ບັນຊີນີ້ຍັງບໍ່ມີ role ໃນ Firebase users", "error");
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginButton.disabled = true;
        setLoginNotice("ກຳລັງກວດສອບກັບ Firebase...", "muted");

        try {
          const { profile } = await signInAndGetProfile(emailInput.value, passwordInput.value);
          setLoginNotice("Login ສຳເລັດ", "success");
          routeByRole(profile.role);
        } catch (error) {
          setLoginNotice(error.message || "Login ບໍ່ຜ່ານ", "error");
          alert(error.message || "Login ບໍ່ຜ່ານ");
        } finally {
          loginButton.disabled = false;
        }
      });

      togglePasswordButton.addEventListener("click", () => {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        togglePasswordButton.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
      });

      listenForAuth((user) => {
        if (user) {
          setLoginNotice("ມີ session Firebase ແລ້ວ, ກະລຸນາ login ອີກຄັ້ງເພື່ອເຊັກ role", "muted");
        }
      });
    </script>
  </body>
</html>
