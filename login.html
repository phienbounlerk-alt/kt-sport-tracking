<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KT SPORT - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand login-brand">
          <div class="brand-mark"><img src="./assets/kt-sport-logo.jpg" alt="KT SPORT logo" /></div>
          <div>
            <strong>KT SPORT</strong>
            <span>ເຄທີ ສະປອສ</span>
          </div>
        </div>
        <h1>ເຂົ້າລະບົບ</h1>
        <form id="loginForm" class="login-form">
          <label>
            Password
            <span class="password-field">
              <input id="passwordInput" type="password" autocomplete="current-password" required autofocus />
              <button id="togglePasswordButton" type="button" aria-label="Show password">👁</button>
            </span>
          </label>
          <button type="submit">Login</button>
          <p id="loginNotice" data-tone="muted">ກະລຸນາໃສ່ລະຫັດເພື່ອເຂົ້າລະບົບ</p>
        </form>
      </section>
    </main>
    <script type="module">
      import { listenForAuth, signInAndGetProfile } from "./firebase-client.js";

      const firebaseSyncEmail = "kotastoreinfo@gmail.com";
      const loginForm = document.querySelector("#loginForm");
      const passwordInput = document.querySelector("#passwordInput");
      const togglePasswordButton = document.querySelector("#togglePasswordButton");
      const loginButton = loginForm.querySelector('button[type="submit"]');

      function setLoginNotice(message, tone = "muted") {
        const notice = document.querySelector("#loginNotice");
        notice.textContent = message;
        notice.dataset.tone = tone;
      }

      async function checkSession() {
        const response = await fetch("/api/session");
        const result = await response.json();
        if (result.authenticated) {
          window.location.href = "/admin.html";
        }
      }

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginButton.disabled = true;
        setLoginNotice("ກຳລັງ login...", "muted");

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: passwordInput.value }),
          });

          if (!response.ok) {
            setLoginNotice("Password ບໍ່ຖືກຕ້ອງ", "error");
            return;
          }

          try {
            await signInAndGetProfile(firebaseSyncEmail, passwordInput.value);
          } catch (firebaseError) {
            console.warn("Firebase login skipped:", firebaseError);
          }

          setLoginNotice("Login ສຳເລັດ", "success");
          window.location.href = "/admin.html";
        } catch (error) {
          setLoginNotice(error.message || "Login ບໍ່ຜ່ານ", "error");
          alert(error.message || "Login ບໍ່ຜ່ານ");
        } finally {
          loginButton.disabled = false;
        }
      });

      togglePasswordButton.addEventListener("click", () => {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        togglePasswordButton.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
      });

      listenForAuth((user) => {
        if (user) {
          setLoginNotice("ມີ session Firebase ແລ້ວ, ກະລຸນາ login ອີກຄັ້ງເພື່ອເຊັກ role", "muted");
        }
      });

      checkSession();
    </script>
  </body>
</html>
