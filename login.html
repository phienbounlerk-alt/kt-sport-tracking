<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KT SPORT - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-panel">
        <div class="brand login-brand">
          <div class="brand-mark"><img src="./assets/kt-sport-logo.jpg" alt="KT SPORT logo" /></div>
          <div>
            <strong>KT SPORT</strong>
            <span>ເຄທີ ສະປອສ</span>
          </div>
        </div>
        <h1>ເຂົ້າລະບົບ</h1>
        <form id="loginForm" class="login-form">
          <label>
            Password
            <span class="password-field">
              <input id="passwordInput" type="password" autocomplete="current-password" required autofocus />
              <button id="togglePasswordButton" type="button" aria-label="Show password">👁</button>
            </span>
          </label>
          <button type="submit">Login</button>
          <p id="loginNotice" data-tone="muted">ກະລຸນາໃສ່ລະຫັດເພື່ອເຂົ້າລະບົບ</p>
        </form>
      </section>
    </main>
    <script src="./login.js"></script>
  </body>
</html>
